<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Will You Play MLBB With Me?</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }body {
  font-family: Arial, sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ffb6d9, #ffd6f6, #ffeef8);
  position: relative;
}

.background-decor span {
  position: absolute;
  font-size: 35px;
  animation: float 5s infinite ease-in-out;
}

.background-decor span:nth-child(1) {
  top: 10%;
  left: 10%;
}

.background-decor span:nth-child(2) {
  top: 20%;
  right: 12%;
}

.background-decor span:nth-child(3) {
  bottom: 15%;
  left: 15%;
}

.background-decor span:nth-child(4) {
  bottom: 10%;
  right: 15%;
}

@keyframes float {
  0%, 100% {
    transform: translateY(0px);
  }
  50% {
    transform: translateY(-20px);
  }
}

.card {
  background: rgba(255,255,255,0.35);
  backdrop-filter: blur(10px);
  padding: 40px 30px;
  border-radius: 30px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  width: 90%;
  max-width: 500px;
  z-index: 2;
  position: relative;
}

h1 {
  color: #ff1493;
  font-size: 32px;
  margin-bottom: 15px;
}

p {
  color: #a1005d;
  font-size: 18px;
  margin-bottom: 30px;
}

.buttons {
  position: relative;
  width: 100%;
  height: 220px;
}

button {
  border: none;
  border-radius: 20px;
  padding: 14px 22px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
  position: absolute;
}

#yesBtn {
  background: #ff4da6;
  color: white;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
}

#noBtn {
  background: #fff;
  color: #ff1493;
  top: 100px;
  left: 40px;
}

#maybeBtn {
  background: #fff;
  color: #ff1493;
  top: 100px;
  right: 40px;
}

#seeBtn {
  background: #fff;
  color: #ff1493;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
}

.popup {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #ff66c4, #ff99dd, #ffd6f6);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 100;
  overflow: hidden;
}

.popup h2 {
  color: white;
  font-size: 42px;
  text-align: center;
  z-index: 2;
  padding: 20px;
}

.firework {
  position: absolute;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  animation: boom 1.2s linear forwards;
}

@keyframes boom {
  0% {
    transform: scale(1);
    opacity: 1;
  }
  100% {
    transform: scale(15);
    opacity: 0;
  }
}

  </style>
</head>
<body>  <div class="background-decor">
    <span>🦋</span>
    <span>🌸</span>
    <span>👑</span>
    <span>💖</span>
  </div>  <div class="card">
    <h1>Will You Be My Partner For Playing MLBB? 💕</h1>
    <p>Choose carefully ☺</p><div class="buttons">
  <button id="yesBtn">Yes 💖</button>
  <button id="noBtn">No 😅</button>
  <button id="maybeBtn">Maybe 🤔</button>
  <button id="seeBtn">Let's See 👀</button>
</div>

  </div>  <div class="popup" id="popup">
    <h2>I knew you would say yes ☺💖</h2>
  </div>  <script>
    const moveButtons = [
      document.getElementById('noBtn'),
      document.getElementById('maybeBtn'),
      document.getElementById('seeBtn')
    ];

    moveButtons.forEach(button => {
      button.addEventListener('mouseenter', () => {
        const maxX = window.innerWidth - 120;
        const maxY = window.innerHeight - 70;

        const randomX = Math.floor(Math.random() * maxX);
        const randomY = Math.floor(Math.random() * maxY);

        button.style.left = randomX + 'px';
        button.style.top = randomY + 'px';
        button.style.right = 'auto';
        button.style.bottom = 'auto';
        button.style.transform = 'none';
      });
    });

    document.getElementById('yesBtn').addEventListener('click', () => {
      const popup = document.getElementById('popup');
      popup.style.display = 'flex';

      for (let i = 0; i < 35; i++) {
        const firework = document.createElement('div');
        firework.classList.add('firework');

        firework.style.left = Math.random() * window.innerWidth + 'px';
        firework.style.top = Math.random() * window.innerHeight + 'px';
        firework.style.background = `hsl(${Math.random() * 360}, 100%, 70%)`;

        popup.appendChild(firework);

        setTimeout(() => {
          firework.remove();
        }, 1200);
      }
    });
  </script></body>
  </html>
